name: 'monoship'
description: 'Publish npm workspace packages to registries. Supports OIDC trusted publishing.'
inputs:
    token:
        description: 'npm auth token. Optional when using OIDC trusted publishing.'
        required: false
    registry:
        description: 'Registry URL to publish to.'
        required: false
        default: 'https://registry.npmjs.org/'
    root-package:
        description: 'Also consider the root package for publishing.'
        required: false
        default: 'true'
    tag:
        description: 'Dist-tag to publish under. Overrides the auto-detected prerelease identifier (e.g. "beta" for 1.0.0-beta.0). Stable versions default to "latest".'
        required: false
    dry-run:
        description: 'Show what would be published without actually publishing.'
        required: false
        default: 'false'
    node-version:
        description: 'Node.js version to use. Set to empty string to skip setup and use the existing Node.js installation.'
        required: false
        default: '22'

branding:
    icon: 'package'
    color: 'blue'

runs:
    using: 'composite'
    steps:
        - name: Setup Node.js
          if: inputs.node-version != ''
          uses: actions/setup-node@v6
          with:
              node-version: ${{ inputs.node-version }}

        - name: Install monoship dependencies
          shell: bash
          run: npm ci --ignore-scripts
          working-directory: ${{ github.action_path }}

        - name: Build monoship
          shell: bash
          run: npm run build
          working-directory: ${{ github.action_path }}

        - name: Run monoship
          shell: bash
          env:
              NODE_AUTH_TOKEN: ${{ inputs.token }}
          run: |
              if [ -z "$NODE_AUTH_TOKEN" ]; then unset NODE_AUTH_TOKEN; fi

              args="--registry ${{ inputs.registry }}"
              if [ "${{ inputs['root-package'] }}" = "true" ]; then args="$args --rootPackage"; else args="$args --no-rootPackage"; fi
              if [ "${{ inputs['dry-run'] }}" = "true" ]; then args="$args --dryRun"; fi
              if [ -n "${{ inputs.tag }}" ]; then args="$args --tag ${{ inputs.tag }}"; fi

              node "${{ github.action_path }}/dist/cli.mjs" $args
